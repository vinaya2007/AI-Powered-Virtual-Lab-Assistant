<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Chatbot</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />

    <!-- Font Awesome (for mic icon) -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="main-container">
      <!-- ☰ Hamburger Menu -->
      <button class="menu-btn" onclick="toggleMenu()">☰</button>

      <!-- Sidebar -->
      <div class="sidebar">
        <h2>⚡ Lab AI</h2>
        <button
          onclick="
            goToDashboard();
            closeMenu();
          "
        >
          🏠 Dashboard
        </button>
        <button
          onclick="
            goToChatbot();
            closeMenu();
          "
        >
          💬 Chatbot
        </button>
        <button
          onclick="
            goToViva();
            closeMenu();
          "
        >
          🎤 Viva
        </button>
        <button
          onclick="
            goToExperiments();
            closeMenu();
          "
        >
          📄 Experiments
        </button>
      </div>

      <!-- Chat Section -->
      <div class="chat-section">
        <h2 style="color: #38bdf8">💬 AI Lab Assistant</h2>
        <p style="color: #94a3b8">
          Enter experiment name or ask your lab doubts
        </p>

        <!-- Suggestions -->
        <div class="suggestions">
          <button onclick="quickSend('Astable Multivibrator')">
            Astable Multivibrator
          </button>
          <button onclick="quickSend('Colpitt Oscillator')">
            Colpitt Oscillator
          </button>
          <button onclick="quickSend('Comparator')">Comparator</button>
        </div>

        <!-- Chatbox -->
        <div id="chatbox"></div>

        <!-- Input Area -->
        <div class="input-area">
          <input id="userInput" type="text" placeholder="Ask anything..." />

          <!-- Mic Button -->
          <button class="mic-btn" onclick="startVoice()" title="Speak now...">
            <i class="fa-solid fa-microphone"></i>
          </button>

          <!-- Send Button -->
          <button onclick="sendMessage()">Send</button>
        </div>
      </div>
    </div>

    <footer class="footer">
      <p>© 2026 AI Virtual Lab Assistant | ECE Department</p>
      <p>Built with Python + AI</p>
    </footer>

    <!-- Main Script -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>

    <!-- Page Scripts -->
    <script>
      // Sidebar toggle (mobile)
      function toggleMenu() {
        document.querySelector(".sidebar").classList.toggle("active");
      }

      // Navigation
      function goToDashboard() {
        window.location.href = "/dashboard";
      }

      function goToChatbot() {
        window.location.href = "/chatbot";
      }

      function goToViva() {
        window.location.href = "/viva";
      }

      function goToExperiments() {
        window.location.href = "/experiments";
      }

      // Suggestion quick send
      function quickSend(text) {
        document.getElementById("userInput").value = text;
        sendMessage();
      }

      // 🎤 Voice input
      function startVoice() {
        if (!("webkitSpeechRecognition" in window)) {
          alert("Voice recognition not supported");
          return;
        }

        let recognition = new webkitSpeechRecognition();
        recognition.lang = "en-US";

        let btn = document.querySelector(".mic-btn");

        recognition.start();
        btn.classList.add("listening");

        recognition.onresult = function (event) {
          btn.classList.remove("listening");

          let transcript = event.results[0][0].transcript;
          document.getElementById("userInput").value = transcript;

          sendMessage();
        };

        recognition.onerror = function () {
          btn.classList.remove("listening");
          alert("Voice error");
        };

        function closeMenu() {
          document.querySelector(".sidebar").classList.remove("active");
        }
      }
    </script>
  </body>
</html>
