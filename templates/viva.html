<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Viva Mode</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="main-container">
      <!-- ☰ Hamburger -->
      <button class="menu-btn" onclick="toggleMenu()">☰</button>

      <!-- Sidebar -->
      <div class="sidebar">
        <h2>⚡ Lab AI</h2>
        <button
          onclick="
            goToDashboard();
            closeMenu();
          "
        >
          🏠 Dashboard
        </button>
        <button
          onclick="
            goToChatbot();
            closeMenu();
          "
        >
          💬 Chatbot
        </button>
        <button
          onclick="
            goToViva();
            closeMenu();
          "
        >
          🎤 Viva
        </button>
        <button
          onclick="
            goToExperiments();
            closeMenu();
          "
        >
          📄 Experiments
        </button>
      </div>

      <!-- Viva Section -->
      <div class="chat-section">
        <h2 style="color: #38bdf8">🎤 Viva Practice</h2>
        <p style="color: #94a3b8">Answer questions and get feedback</p>

        <!-- Chatbox -->
        <div id="chatbox"></div>

        <!-- Input -->
        <div class="input-area">
          <input id="userInput" type="text" placeholder="Type your answer..." />
          <button onclick="sendAnswer()">Submit</button>
        </div>
      </div>
    </div>
    <footer class="footer">
      <p>© 2026 AI Virtual Lab Assistant | ECE Department</p>
      <p>Built with Python + AI</p>
    </footer>

    <!-- Viva Script -->
    <script src="{{ url_for('static', filename='viva.js') }}"></script>

    <!-- Common Scripts -->
    <script>
      // Sidebar toggle
      function toggleMenu() {
        document.querySelector(".sidebar").classList.toggle("active");
      }

      // Navigation
      function goToDashboard() {
        window.location.href = "/dashboard";
      }

      function goToChatbot() {
        window.location.href = "/chatbot";
      }

      function goToViva() {
        window.location.href = "/viva";
      }

      function goToExperiments() {
        window.location.href = "/experiments";
      }

      function closeMenu() {
        document.querySelector(".sidebar").classList.remove("active");
      }
    </script>
  </body>
</html>
